<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>
  <link rel="stylesheet" href="css/cadastroElogin.css">
</head>

<body>


  <div class="container">
    <form class="form">
      <h2>Cadastro</h2>
      <input type="text" class="campo" placeholder="Nome Completo" id="InNome">
      <p style="display: none; color: red;" id="nomeIn">Nome Inválido</p>
      <input type="text" class="campo" placeholder="Email" id="InEmail">
      <p style="display: none; color: red;" id="emailIn">Email Inválido</p>
      <input type="password" class="campo" placeholder="Senha" id="InSenha">
      <p style="display: none; color: red;" id="senhaIn">Senha Inválida</p>
      <button type="button" class="botao" onclick="cadastrar()">Cadastrar</button>
      <div id="div_mensagem"></div>
    </form>
  </div>

</body>

</html>
<script>
  function cadastrar() {
    let nome = InNome.value;
    let email = InEmail.value;
    let senha = InSenha.value;



    let posArroba = email.indexOf('@');
    let posCom = email.indexOf('.com');

    if (nome == '') {
      InNome.style.border = "solid red 3px";
      nomeIn.style.display = "block"
      return;
    } else {
      InNome.style.border = "none"
      nomeIn.style.display = "none"
    }

    if (email == '') {
      InEmail.style.border = "solid red 3px";
      emailIn.style.display = "block"
      return;
    } else {
      InEmail.style.border = "none";
      emailIn.style.display = "none";
    }


    if (
      posArroba <= 0 ||
      posCom <= posArroba + 1 ||
      posCom != email.length - 4
    ) {
      InEmail.style.border = "solid red 3px";
      emailIn.style.display = "block"
      return;
    } else {
      InEmail.style.border = "none";
      emailIn.style.display = "none";
    }

    if (senha == '') {
      InSenha.style.border = "solid red 3px";
      senhaIn.style.display = "block";
      return;
    } else {
      InSenha.style.border = "none";
      senhaIn.style.display = "none";
    }

    if (senha.length < 6) {
      InSenha.style.border = "solid red 3px";
      senhaIn.style.display = "block";
      return;
    } else {
      InSenha.style.border = "none";
      senhaIn.style.display = "none";
    }
    div_mensagem.innerHTML = "✅ Cadastro realizado com sucesso! Redirecionando...";
    div_mensagem.style.color = "green"

    setTimeout(() => {
      window.location.href = "login.html";
    },1000);

    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nome,
        emailServer: email,
        senhaServer: senha,
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }
  

</script>
